<!DOCTYPE html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark-reasonable.min.css"
      integrity="sha512-RwXJS3k4Z0IK6TGoL3pgQlA9g2THFhKL7z9TYWdAI8u6xK0AUuMWieJuWgTRayywC9A94ifUj1RzjDa1NIlUIg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Showcord" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Showcord | Pokemon Showdown Client for Battles and Chat</title>
    <meta
      name="description"
      content="Showcord is a modern Pokemon Showdown client. Join battles, chat rooms, and private messages with a streamlined interface."
    />
    <meta
      name="robots"
      content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1"
    />
    <link rel="canonical" href="https://showcord.com/" />

    <!-- Preconnect to third-party origins -->
    <link rel="dns-prefetch" href="https://play.pokemonshowdown.com">
    <link rel="preconnect" href="https://play.pokemonshowdown.com" crossorigin>
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="dns-prefetch" href="https://code.jquery.com">
    <link rel="preconnect" href="https://code.jquery.com" crossorigin>

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://showcord.com/" />
    <meta property="og:site_name" content="Showcord" />
    <meta property="og:title" content="Showcord | Pokemon Showdown Client for Battles and Chat" />
    <meta
      property="og:description"
      content="Showcord is a modern Pokemon Showdown client. Join battles, chat rooms, and private messages with a streamlined interface."
    />
    <meta property="og:image" content="https://showcord.com/assets/pokeball_galaxy.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://showcord.com/" />
    <meta name="twitter:title" content="Showcord | Pokemon Showdown Client for Battles and Chat" />
    <meta
      name="twitter:description"
      content="Showcord is a modern Pokemon Showdown client. Join battles, chat rooms, and private messages with a streamlined interface."
    />
    <meta name="twitter:image" content="https://showcord.com/assets/pokeball_galaxy.png" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Showcord",
        "applicationCategory": "CommunicationApplication",
        "operatingSystem": "Web",
        "url": "https://showcord.com/",
        "description": "Showcord is a modern Pokemon Showdown client for battles and chat.",
        "image": "https://showcord.com/assets/pokeball_galaxy.png",
        "author": {
          "@type": "Organization",
          "name": "Showcord"
        }
      }
    </script>
    
    <!-- Polyfill for exports -->
    <script>window.exports = window;</script>
    
    <!-- jQuery (required by Pokemon Showdown Client) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

    <!-- Pokemon Showdown Data -->
    <script src="//play.pokemonshowdown.com/data/pokedex-mini.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/pokedex.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/moves.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/items.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/abilities.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/typechart.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/graphics.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/teambuilder-tables.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/aliases.js" defer></script>
    <script src="//play.pokemonshowdown.com/data/text.js" defer></script>
  </head>
  <body style="height: 100vh; width: 100vw; overflow: hidden">
    <div id="root" style="height: 100vh; width: 100vw; overflow: hidden" class="bg-gray-sidebar-light dark:bg-gray-600"></div>
    <script type="module" src="src/index.tsx"></script>
  </body>
